planning:
  initial_facts: |-
    {{role}}
    
    Here is the task:
    ```
    {{task}}
    ```

    You will now write the list facts we need to know to complete the task.
    To do so, you will have to think about the task within the constraints of your role.
    After writing the final step of the plan, write the '\n<end_facts>' tag and stop there.
    
    Now begin!
  initial_plan : |-
    {{role}}

    Here is the task:
    ```
    {{task}}
    ```
    
    Now for the given task, develop a step-by-step plan with minimal steps taking into account the list of facts.
    Do not skip steps, do not add any steps not explicitly required in the task. 

    You can leverage these functions for executing the steps:
    {%- for server in mcp_servers.values() %}
    - {{ server.name }}: {{ server.description }}
        Takes inputs: {{server.inputs}}
        Returns an output of type: {{server.output_type}}
    {%- endfor %}

    You do not have any other functions than the ones listed above. You must only use them to solve the task.

    List of facts that you need to know:  
    ```
    {{facts}}
    ```

    Write a step by step plan  with maximum {{ max_steps }} steps. 
    You must prefix every step with "-" 
    You must prefix the first step with "✳️"

    After writing the final step of the plan, write the '\n<end_plan>' tag and stop there.

    Now begin! Write your plan below.
  update_facts_pre_messages: |-
    {{role}}
    
    Here is the task:
    ```
    {{task}}
    ```
    
    Find the conversation history below:
  update_facts_post_messages: |-
    Your current complete understanding of facts is as follows:
    ```
    {{ facts }}
    ```
    Read the conversation history above and find any new facts or invalidate some false ones.
    Please update your list of facts based on the previous history, and provide these headings:
    ### 1. Facts that we confirmed
    ### 2. Facts still unknown
    
    Now begin!
  update_plan_pre_messages: |-
    {{role}}
    
    Here is the task:
    ```
    {{task}}
    ```

    Your current plan is as follows:
    ```
    {{ plan }}
    ```
    
    It is based on the following facts:
    ```
    {{ facts }}
    ```

    Find the conversation history below:
  update_plan_post_messages: |-

    You can leverage these functions for executing steps in the plan:
    {%- for server in mcp_servers.values() %}
    - {{ server.name }}: {{ server.description }}
        Takes inputs: {{server.inputs}}
        Returns an output of type: {{server.output_type}}
    {%- endfor %}

    Read the conversation history above and write a new plan as follows:

    1. Prefix step that has successfully completed with [x].
    2. Prefix step that has failed with [].
    3. Remove steps that are no longer relevant.
    4. Update the plan based on the new facts.
    5. Add new steps if needed but total steps must be less than {{ max_steps }}.
    6. Prefix next step to execute with ✳️
    
    After writing the final step of the plan, write the '\n<end_plan>' tag and stop there.

    Now begin! Write your plan below.
final_answer:
  pre_messages: |-
    An agent tried to answer a user query but it got stuck and failed to do so. You are tasked with providing an answer instead. Here is the agent's memory:
  post_messages: |-
    Based on the above, please provide an answer to the following user task:
    {{task}}
