planning:
  initial_facts: |-
    {{role}}
    
    Here is the task:
    ```
    {{task}}
    ```

    You will now write the list facts that is relevant to the task.
    You will have to think about the task within the constraints of your role.
    
    Now begin!
  initial_plan : |-
    {{role}}

    Here is the task:
    ```
    {{task}}
    ```

    List of facts you can use:  
    ```
    {{facts}}
    ```
    
    Now for the given task, develop a step-by-step plan taking into account the list of facts.
    
    You can leverage these functions for executing the steps:
    {%- for server in mcp_servers.values() %}
    - {{ server.name }}: {{ server.description }}
        Takes inputs: {{server.inputs}}
        Returns an output of type: {{server.output_type}}
    {%- endfor %}

    You do not have any other functions than the ones listed above. You must only use them to solve the task.
    
    Here are the rules you should always follow to write your plan:
    1. You must prefix every step with "[pending]" .
    2. You must prefix the first step with "[next]".
    3. Each step must be concise and to the point so that it can be verified with a single test.
    4. Do not skip steps, do not add any steps not explicitly required in the task.

    After writing the final step of the plan, write the '\n<end_plan>' tag and stop there.

    Now begin!
  update_facts_pre_messages: |-
    {{role}}
    
    Here is the task:
    ```
    {{task}}
    ```

    List of facts you can use:  
    ```
    {{ facts }}
    ```
    
    Find the conversation history below:
  update_facts_post_messages: |-
    Read the conversation history above and find any new facts or invalidate some false ones.
    Please update your list of facts based on the previous history, and provide these headings:
    ### 1. Facts that are established.
    ### 2. Facts still unknown
    
    Now begin!
  update_plan_pre_messages: |-
    {{role}}
    
    Here is the task:
    ```
    {{task}}
    ```

    List of facts you can use:  
    ```
    {{ facts }}
    ```
    
    Your current plan is as follows:
    ```
    {{ plan }}
    ```
    
    Find the conversation history below:
  update_plan_post_messages: |-

    You can leverage these functions for executing steps in the plan:
    {%- for server in mcp_servers.values() %}
    - {{ server.name }}: {{ server.description }}
        Takes inputs: {{server.inputs}}
        Returns an output of type: {{server.output_type}}
    {%- endfor %}

    Read the conversation history above and update the current plan as follows:

    Here are the rules you should always follow to write your plan:
    1. You must prefix every new step with "[pending]" .
    2. You must prefix the next step with "[next_step]".
    3. You must prefix the step that has successfully completed with [completed].
    4. You must prefix the step that has failed with [failed].
    5. Each step must be concise and to the point so that it can be verified with a single test.
    
    After writing the final step of the plan, write the '\n<end_plan>' tag and stop there.

    Now begin! 
final_answer:
  pre_messages: |-
    An agent tried to answer a user query but it got stuck and failed to do so. You are tasked with providing an answer instead. Here is the agent's memory:
  post_messages: |-
    Based on the above, please provide an answer to the following user task:
    {{task}}
