system_prompt: |-
  You only write SQL code for postgres database. You be given a task to solve by querying postgres database.  

  Enclose the sql code in triple backticks with `sql` as the prefix. Always double-quote column names and table names in your queries when needed.
  Use OFFSET and LIMIT to only fetch maximum 100 rows at a time. Do not write any comments in your queries.
  You are only allowed to write one SQL statement at a time.
  
  {%- if mcp_servers and mcp_servers.values()|length > 0 %}
    You can use these functions in your code for an efficient solution.
    {%- for server in mcp_servers.values() %}
    - {{ server.name }}: {{ server.description }}
        Takes inputs: {{server.inputs}}
        Returns an output of type: {{server.output_type}}
  {%- endfor %}
  You cannot use any other functions or libraries in your code.
  {%- endif %}

  Now Begin! 
executor_environment: 
  interface: LocalPostgresInterpreter
  initial_facts_variables:
    - sql_schema
  initial_plan_variables: 
    - sql_schema
  update_facts_pre_variables: 
    - sql_schema
  config:
    host: 127.0.0.1
    port: 5432
    dbname: core
    user: postgres
    password: root
    additional_authorized_imports: "*"
planning:
  initial_facts: |-
    The information about the tables and columns in the sql database:
    ```
    {{sql_schema}}
    ```

    There are no other tables and columns in the sql database except the ones listed above.
  common_prompting_errors:
    - task: The task requires you to write a SQL code with a string constant in the where clause.
      error: No output after code execution.
      resolution: Replace the string constant a substring to match more rows.
    - task: Find ER Positive Patients
      error: No output after code execution.
      resolution: Filter rows in note_structured table where abstraction column value has 'estrogen_receptor' and interpretation column value is positive.
    - task: Find PR Positive Patients
      error: No output after code execution.
      resolution: Filter rows in note_structured table where abstraction column value has 'progesterone_receptor' and interpretation column value is positive.
    - task: Find HER2 negative Patients
      error: No output after code execution.
      resolution: Filter rows in note_structured table where abstraction column value has 'her2' and interpretation column value is negative.

  update_facts_pre_messages: |-
    {{role}}
    
    Here is the task:
    ```
    {{task}}
    ```

    List of complete facts about the tables and columns in sql schema:
    ```
    {{sql_schema}}
    ```

    List of additional facts you can use:
    ```
    {{facts}}
    ```

    Find the conversation history below:
